<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">STS2 AI training loop</title>
  <desc id="desc">The local loop from game state to data, training, model decision, and control panel execution.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#2f6f78"/>
    </marker>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf5f2"/>
    </linearGradient>
  </defs>
  <rect width="980" height="260" rx="24" fill="#fbfaf5"/>
  <path d="M114 132 H266 M384 132 H536 M654 132 H806" stroke="#2f6f78" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" opacity=".72"/>
  <path d="M823 168 C694 232 354 236 180 168" fill="none" stroke="#d1a23a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" opacity=".75"/>
  <g transform="translate(36 72)">
    <rect width="132" height="104" rx="18" fill="url(#tile)" stroke="#2f6f78" stroke-opacity=".28"/>
    <path d="M46 36 H86 M46 55 H76" stroke="#2f6f78" stroke-width="6" stroke-linecap="round" opacity=".38"/>
    <path d="M52 84 L66 62 L80 84 Z" fill="#d1a23a"/>
    <text x="66" y="122" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#26373a">Game</text>
  </g>
  <g transform="translate(286 72)">
    <rect width="132" height="104" rx="18" fill="#fff" stroke="#2f6f78" stroke-opacity=".28"/>
    <path d="M32 34 H98 M32 54 H88 M32 74 H104" stroke="#2f6f78" stroke-width="7" stroke-linecap="round" opacity=".30"/>
    <circle cx="102" cy="32" r="10" fill="#d1a23a"/>
    <text x="66" y="122" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#26373a">Data</text>
  </g>
  <g transform="translate(536 72)">
    <rect width="132" height="104" rx="18" fill="url(#tile)" stroke="#2f6f78" stroke-opacity=".28"/>
    <circle cx="42" cy="54" r="14" fill="#2f6f78" opacity=".82"/>
    <circle cx="88" cy="38" r="12" fill="#d1a23a"/>
    <circle cx="88" cy="74" r="12" fill="#f0b9aa"/>
    <path d="M55 52 H76 M88 50 V62" stroke="#26373a" stroke-width="4" stroke-linecap="round" opacity=".45"/>
    <text x="66" y="122" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#26373a">Model</text>
  </g>
  <g transform="translate(786 72)">
    <rect width="132" height="104" rx="18" fill="#fff" stroke="#2f6f78" stroke-opacity=".28"/>
    <rect x="29" y="28" width="74" height="50" rx="10" fill="#edf5f2"/>
    <path d="M42 44 H90 M42 62 H78" stroke="#2f6f78" stroke-width="6" stroke-linecap="round" opacity=".38"/>
    <text x="66" y="122" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#26373a">Control</text>
  </g>
</svg>
