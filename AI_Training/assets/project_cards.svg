    </linearGradient>
    <linearGradient id="potion" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9fd3d1"/>
      <stop offset="1" stop-color="#2f6f78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#26373a" flood-opacity=".15"/>
    </filter>
  </defs>
